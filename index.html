  <!-- =====================================================
  MONGOLIAN CASHMERE HERDER NETWORK — Website Draft
  Prepared for BEAR / ADB project review

  SITEMAP
  ────────────────────────────────────────────────────────
  /               Home
  /about-project  About the Project
  /about-network  About the Network
  /resources      Resources
  /opportunities  Opportunities & Connections
  /learning       Learning & Extension
  /alerts         Alerts & Field Information
  /community      Community / Facebook Group
  /outputs        Project Outputs
  /contact        Contact & Partners

  DESIGN CONCEPT
  ────────────────────────────────────────────────────────
  • Institutional editorial aesthetic: policy-research site meets
    development finance platform — closer to Brookings than to Facebook
  • Typography: DM Serif Display (headings) + Outfit (body) —
    authoritative warmth without stuffiness
  • Palette: deep navy / ink / bright blue / soft blue / near-white —
    cool, clean, internationally legible
  • Layout rhythm: generous whitespace, alternating white/#FAF7F2
    sections, thin blue-gray borders, subtle card lift on hover
  • Hero treatment: gradient navy background with geometric hairlines,
    dual-logo lockup, three-button CTA hierarchy
  • No brown, no earthy warmth, no rustic NGO aesthetic,
    no startup neon — just restrained modern credibility
  • Bilingual-ready structure: all section labels and card headers
    can accept Mongolian/English pairings without layout changes

  ASSET NOTE: Replace logo paths before deployment:
    /assets/bear-logo.png  — BEAR Institute logo
    /assets/adb-logo.png   — Asian Development Bank logo
  ===================================================== -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      color: #1A0F07;
      background: #fff;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }
    h1, h2, h3 {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 600;
      line-height: 1.18;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    button { font-family: 'IBM Plex Sans', sans-serif; cursor: pointer; }

    /* ── Layout ── */
    .container { max-width: 1160px; margin: 0 auto; padding: 0 28px; }
    .section { padding: 88px 0; }
    .section--sm { padding: 56px 0; }
    .section--alt { background: #FAF7F2; }
    .section--softblue { background: #F5ECD7; }
    .section--navy { background: #2C1810; color: #fff; }
    .section--ink { background: #1A0F07; color: #fff; }

    /* ── Typography ── */
    .eyebrow {
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #A07840;
      display: block;
      margin-bottom: 14px;
    }
    .eyebrow--white { color: rgba(255,255,255,0.6); }
    .section-title { font-size: clamp(28px, 3.6vw, 44px); color: #2C1810; margin-bottom: 18px; }
    .section-title--white { color: #fff; }
    .section-lead {
      font-size: 17px;
      line-height: 1.75;
      color: #6B5744;
      max-width: 620px;
      margin-bottom: 52px;
    }
    .section-lead--white { color: rgba(255,255,255,0.72); }
    .accent-rule { width: 36px; height: 3px; background: #A07840; border-radius: 2px; margin-bottom: 28px; }

    /* ── Cards ── */
    .card {
      background: #fff;
      border: 1px solid #E2D5C3;
      border-radius: 10px;
      padding: 28px 30px;
      box-shadow: 0 1px 2px rgba(0,29,57,.05), 0 4px 14px rgba(0,29,57,.04);
      transition: box-shadow .2s ease, transform .2s ease;
    }
    .card:hover {
      box-shadow: 0 2px 6px rgba(0,29,57,.09), 0 8px 28px rgba(0,29,57,.07);
      transform: translateY(-2px);
    }
    .card--flat { box-shadow: none; }
    .card--navy { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: #fff; }
    .card--navy:hover { background: rgba(255,255,255,0.09); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 26px;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      transition: all .18s ease;
      border: none;
      white-space: nowrap;
    }
    .btn-primary { background: #A07840; color: #fff; }
    .btn-primary:hover { background: #8A6530; }
    .btn-secondary { background: #2C1810; color: #fff; }
    .btn-secondary:hover { background: #3D2315; }
    .btn-outline { background: transparent; color: #2C1810; border: 1.5px solid #E2D5C3; }
    .btn-outline:hover { border-color: #A07840; color: #A07840; }
    .btn-white { background: #fff; color: #2C1810; }
    .btn-white:hover { background: #F5ECD7; }
    .btn-ghost-white { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,.35); }
    .btn-ghost-white:hover { border-color: #fff; background: rgba(255,255,255,.08); }
    .btn-sm { padding: 9px 18px; font-size: 13px; }

    /* ── Grids ── */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 4px;
      background: #F5ECD7;
      color: #A07840;
    }
    .tag--green { background: #E6F5EC; color: #1A8A45; }
    .tag--amber { background: #FFF5E6; color: #C17A1A; }
    .tag--red { background: #FFEAEA; color: #C0392B; }
    .tag--navy { background: rgba(0,29,57,0.08); color: #2C1810; }

    /* ── Nav ── */
    .nav-wrap {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #E2D5C3;
    }
    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      gap: 32px;
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    .nav-brand img {
      height: 34px;
      width: auto;
      object-fit: contain;
    }
    .nav-brand-sep {
      width: 1px;
      height: 26px;
      background: #E2D5C3;
    }
    .nav-brand-text {
      font-size: 13px;
      font-weight: 700;
      color: #2C1810;
      letter-spacing: .01em;
      line-height: 1.3;
      max-width: 200px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
    }
    .nav-links button {
      background: none;
      border: none;
      font-size: 13.5px;
      font-weight: 500;
      color: #6B5744;
      padding: 7px 11px;
      border-radius: 6px;
      transition: all .15s;
    }
    .nav-links button:hover { color: #2C1810; background: #FAF7F2; }
    .nav-links button.active { color: #A07840; background: #F5ECD7; font-weight: 600; }
    .nav-cta { flex-shrink: 0; }
    .hamburger {
      display: none;
      background: none;
      border: none;
      padding: 8px;
      color: #2C1810;
    }

      padding: 100px 0 96px;
      position: relative;
      overflow: hidden;

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(150deg, rgba(20,10,4,0.78) 0%, rgba(30,16,6,0.65) 60%, rgba(44,24,16,0.55) 100%);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      background: linear-gradient(to top, rgba(20,10,4,0.4) 0%, transparent 100%);
      pointer-events: none;
    }
    .hero-content { position: relative; z-index: 1; max-width: 740px; }
    .hero-logos {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 44px;
    }
    .hero-logo {
      height: 38px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: 0.92;
    }
    /* Fallback when image can't load */
    .logo-fallback {
      display: flex;
      align-items: center;
      height: 38px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 5px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      color: rgba(255,255,255,0.85);
    }
    .hero-logos-sep { width: 1px; height: 30px; background: rgba(255,255,255,0.2); }
    .hero-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      padding: 5px 12px;
      margin-bottom: 24px;
    }
    .hero h1 {
      font-size: clamp(30px, 4vw, 48px);
      line-height: 1.1;
      margin-bottom: 22px;
      color: #fff;
    }
    .hero-sub {
      font-size: 18px;
      line-height: 1.7;
      color: rgba(255,255,255,0.72);
      max-width: 580px;
      margin-bottom: 44px;
    }
    .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }

    /* ── Audience cards ── */
    .audience-card {
      padding: 28px;
      border-radius: 10px;
      border: 1px solid #E2D5C3;
      background: #fff;
    }
    .audience-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #F5ECD7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: #A07840;
    }

    /* ── Feature list ── */
    .feature-item { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 28px; }
    .feature-icon {
      width: 40px;
      height: 40px;
      background: #F5ECD7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #A07840;
    }

    /* ── Resource cards ── */
    .resource-card {
      background: #fff;
      border: 1px solid #E2D5C3;
      border-radius: 8px;
      padding: 22px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .resource-card:hover { border-color: #A07840; }
    .resource-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .resource-card h4 { font-family: 'IBM Plex Sans', sans-serif; font-size: 14.5px; font-weight: 600; color: #2C1810; line-height: 1.4; }
    .resource-card .source { font-size: 12px; color: #9C8470; font-weight: 500; }
    .resource-card .desc { font-size: 13.5px; color: #6B5744; line-height: 1.55; flex: 1; }
    .resource-card-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }

    /* ── Category section ── */
    .cat-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #E2D5C3;
    }
    .cat-icon {
      width: 36px;
      height: 36px;
      background: #F5ECD7;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #A07840;
      flex-shrink: 0;
    }
    .cat-header h3 { font-family: 'IBM Plex Sans', sans-serif; font-size: 16px; font-weight: 700; color: #2C1810; }

    /* ── Alert cards ── */
    .alert-card {
      border-radius: 10px;
      padding: 28px;
      border-left: 4px solid;
    }
    .alert-card--red { background: #FFF5F5; border-color: #E74C3C; }
    .alert-card--amber { background: #FFFBF0; border-color: #F39C12; }
    .alert-card--blue { background: #F5ECD7; border-color: #A07840; }
    .alert-card--teal { background: #F0FAFA; border-color: #1ABC9C; }

    /* ── Table ── */
    .compare-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .compare-table th {
      background: #2C1810;
      color: #fff;
      padding: 14px 20px;
      text-align: left;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .03em;
    }
    .compare-table th:first-child { border-radius: 6px 0 0 0; }
    .compare-table th:last-child { border-radius: 0 6px 0 0; }
    .compare-table td { padding: 12px 20px; border-bottom: 1px solid #E2D5C3; vertical-align: top; color: #3A4A5E; line-height: 1.5; }
    .compare-table tr:last-child td { border-bottom: none; }
    .compare-table tr:nth-child(even) td { background: #FAF7F2; }

    /* ── Output doc cards ── */
    .doc-card {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      padding: 22px 24px;
      background: #fff;
      border: 1px solid #E2D5C3;
      border-radius: 10px;
      transition: box-shadow .2s, transform .2s;
    }
    .doc-card:hover { box-shadow: 0 4px 20px rgba(0,29,57,.08); transform: translateY(-1px); }
    .doc-icon {
      width: 44px;
      height: 56px;
      background: #F5ECD7;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #A07840;
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      flex-direction: column;
      gap: 4px;
    }

    /* ── Footer ── */
    .footer {
      background: #2C1810;
      color: rgba(255,255,255,0.7);
      padding: 64px 0 32px;
    }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 48px;
      margin-bottom: 52px;
    }
    .footer-brand p { font-size: 14px; line-height: 1.7; margin-top: 16px; }
    .footer-logos { display: flex; align-items: center; gap: 18px; margin-bottom: 16px; }
    .footer-logo { height: 30px; width: auto; filter: brightness(0) invert(1); opacity: 0.6; }
    .footer h4 { font-size: 12px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 18px; }

// ── Logo Component (with graceful fallback) ─────────────
const Logo = ({ src, alt, height = 34, cls = '', fallbackText = '' }) => (
  <img
    src={src}
    alt={alt}
    className={cls}
    style={{ height, width: 'auto', objectFit: 'contain' }}
    onError={e => {
      e.target.style.display = 'none';
      const fb = document.createElement('span');
      fb.className = 'logo-fallback';
      fb.textContent = fallbackText;
      e.target.parentNode.insertBefore(fb, e.target.nextSibling);
    }}
  />
);

    {/* ── What the Network Provides ── */}
    <section className="section section--alt" aria-labelledby="what-provides">
      <div className="container">
        <div className="grid-2" style={{gap:64,alignItems:'center'}}>
          <div>
            <span className="eyebrow">{T[lang].whatProvides}</span>
            <h2 className="section-title" id="what-provides">{T[lang].practicalSupport}</h2>
            <p style={{fontSize:16,color:'#6B5744',lineHeight:1.75,marginBottom:36}}>
              {T[lang].networkDesc}
            </p>
            {[
              { icon:'book', label:T[lang].pCur, desc:T[lang].pCurD },
              { icon:'connect', label:T[lang].pEco, desc:T[lang].pEcoD },
              { icon:'money', label:T[lang].pMkt, desc:T[lang].pMktD },
              { icon:'vet', label:T[lang].pAni, desc:T[lang].pAniD },
              { icon:'weather', label:T[lang].pWx, desc:T[lang].pWxD },
              { icon:'file', label:T[lang].pOut, desc:T[lang].pOutD },
            ].map(f => (
              <div className="feature-item" key={f.label}>
                <div className="feature-icon"><Ico n={f.icon} s={18} c="#A07840"/></div>
                <div>
                  <div style={{fontWeight:600,fontSize:14.5,color:'#2C1810',marginBottom:3}}>{f.label}</div>
                  <div style={{fontSize:13.5,color:'#6B5744',lineHeight:1.6}}>{f.desc}</div>
                </div>
              </div>
            ))}
          </div>
          <div>
            <div style={{background:'#fff',border:'1px solid #E2D5C3',borderRadius:12,padding:36}}>
              <div className="accent-rule"/>
              <h3 style={{fontFamily:'IBM Plex Sans',fontSize:26,color:'#2C1810',marginBottom:16}}>
                {T[lang].stableHub}
              </h3>
              <p style={{fontSize:15,color:'#6B5744',lineHeight:1.75,marginBottom:24}}>
                {T[lang].stableMsg}
              </p>
              <p style={{fontSize:15,color:'#6B5744',lineHeight:1.75,marginBottom:28}}>
                {T[lang].fbLayer}
              </p>
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                <button className="btn btn-primary" onClick={()=>nav('resources')}>{T[lang].browseRes}</button>

              </div>
            </div>
          </div>
        </div>

            <h3 style={{fontFamily:'IBM Plex Sans',fontWeight:700,fontSize:17,color:'#2C1810',marginBottom:12}}>Berkeley Economic Advising and Research (BEAR)</h3>
            <p style={{fontSize:14.5,color:'#6B5744',lineHeight:1.75,marginBottom:16}}>
              Berkeley Economic Advising and Research (BEAR) conducts applied economic and policy research with a focus on development-relevant analysis in Mongolia and the region. BEAR's relevant areas of work include rural development, food security, natural resource policy, poverty reduction, climate risk, and international project experience across the agricultural and livestock sector.
            </p>

// MAIN APP
// ─────────────────────────────────────────────────────────
const App = () => {
  const [page, setPage] = useState('home');
  const [menuOpen, setMenuOpen] = useState(false);
  const [lang, setLang] = useState('en');

  const navigate = (p) => {
    setPage(p);
    setMenuOpen(false);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  return (
    <>
      <Header active={page} nav={navigate} open={menuOpen} setOpen={setMenuOpen} lang={lang} setLang={setLang} />
      <main id="main-content">
        {page === 'home'           && <HomePage nav={navigate} lang={lang} />}
        {page === 'about-project'  && <AboutProjectPage nav={navigate} lang={lang} />}
        {page === 'about-network'  && <AboutNetworkPage nav={navigate} lang={lang} />}
        {page === 'resources'      && <ResourcesPage nav={navigate} lang={lang} />}
        {page === 'opportunities'  && <OpportunitiesPage nav={navigate} lang={lang} />}
        {page === 'learning'       && <LearningPage nav={navigate} lang={lang} />}
        {page === 'alerts'         && <AlertsPage nav={navigate} lang={lang} />}
        {page === 'community'      && <CommunityPage nav={navigate} lang={lang} />}
        {page === 'outputs'        && <ProjectOutputsPage nav={navigate} lang={lang} />}
        {page === 'contact'        && <ContactPage nav={navigate} lang={lang} />}
      </main>
      <Footer nav={navigate} lang={lang} />

      {/* ─────────────────────────────────────────────────
      IMPLEMENTATION NOTES (developer reference)
      ──────────────────────────────────────────────────
      WEBSITE vs FACEBOOK GROUP:
        Website: project overview, stable resources, directories,
          training guides, price references, official outputs,
          partner info, emergency preparedness guides, curated links
        Facebook group: peer questions, local recommendations,
          price observations, time-sensitive updates, informal
          coordination, short-lived opportunities, community posts

      MOST USEFUL FOR OFFICIALS / STAKEHOLDERS:
        1. Home page — quick project credibility and orientation
        2. About the Project — formal overview and partner context
        3. Project Outputs — documents and publications
        4. Contact & Partners — official information and logos
        5. Resources — institutional materials and directories

      RECOMMENDED NEXT CONTENT STEPS:
        1. Add real logo files at /assets/bear-logo.png and /assets/adb-logo.png
        2. Confirm and add project contact email
        3. Add first real resources to Resource Library (start with 10–15)
        4. Confirm Facebook group URL and update links
        5. Add first real project document to Project Outputs
        6. Review and confirm BEAR description text with BEAR team
        7. Add Mongolian language toggle (structure is bilingual-ready)
        8. Confirm partner list and add any missing organizations
      ───────────────────────────────────────────────── */}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
